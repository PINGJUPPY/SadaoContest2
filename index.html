<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>มหกรรมวิชาการสาธารณสุข อำเภอสะเดา ปี 2569</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* CSS สำหรับ Glassmorphism และ Background */
        body {
            background-image: url('https://img2.pic.in.th/Untitled-designbdebf65cb43b24c0.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Sarabun', sans-serif;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            border-radius: 1.5rem;
        }
        .glow-logo {
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.8));
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.6)); }
            50% { filter: drop-shadow(0 0 25px rgba(255, 255, 255, 1)); }
            100% { filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.6)); }
        }
        /* ซ่อนหน้าต่างตอนเริ่มต้น */
        .hidden-page { display: none !important; }
    </style>
</head>
<body class="min-h-screen text-gray-800 flex flex-col justify-between">

    <div id="login-section" class="flex-grow flex items-center justify-center">
        <div class="glass-panel p-8 w-96 flex flex-col items-center relative transition-all duration-300">
            <img src="https://img2.pic.in.th/--PNG-logoname987ca59085a3c57a.png" class="w-32 mb-6 glow-logo" alt="Logo">
            <h2 class="text-2xl font-bold mb-4 text-white drop-shadow-md">เข้าสู่ระบบ</h2>
            <input type="password" id="login-id" maxlength="6" placeholder="รหัสผ่าน 6 หลัก" 
                   class="w-full p-3 mb-4 rounded-xl border-none outline-none text-center text-xl bg-white bg-opacity-70 focus:bg-opacity-100 transition-all">
            <button onclick="handleLogin()" id="btn-login"
                    class="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-semibold transition-colors duration-300 shadow-lg">
                ตกลง
            </button>
            <p id="cooldown-timer" class="text-red-200 mt-3 hidden text-sm font-bold"></p>
        </div>
    </div>

    <div id="main-app" class="hidden-page flex-grow flex flex-col h-screen">
        <header class="glass-panel m-4 p-4 flex justify-between items-center z-10">
            <div class="flex items-center gap-4">
                <img src="https://img2.pic.in.th/--PNG-logoname987ca59085a3c57a.png" class="w-12 glow-logo" alt="Logo">
                <div>
                    <h1 class="font-bold text-lg text-white drop-shadow">มหกรรมวิชาการสาธารณสุข อำเภอสะเดา ปี 2569</h1>
                    <p class="text-sm text-gray-200">โรงพยาบาลสะเดา - <span id="current-menu-title">หน้าหลัก</span></p>
                </div>
            </div>
            <div class="text-right text-white">
                <p class="font-bold" id="user-name">ชื่อ-สกุล</p>
                <p class="text-sm bg-blue-500 px-2 rounded-full inline-block mt-1" id="user-role">Role</p>
            </div>
        </header>

        <main class="flex-grow overflow-y-auto p-4 z-10" id="content-area">
            </main>

        <nav class="glass-panel mx-4 mb-2 p-2 flex justify-around items-center text-white z-10">
            <button class="nav-btn hover:text-blue-300 flex flex-col items-center" onclick="navigate('home')">หน้าหลัก</button>
            <button class="nav-btn hover:text-blue-300 flex flex-col items-center" onclick="navigate('works')">ผลงาน</button>
            <button class="nav-btn hover:text-blue-300 flex flex-col items-center" onclick="navigate('scoring')">ให้คะแนน</button>
            <button class="nav-btn hover:text-blue-300 flex flex-col items-center" onclick="navigate('summary')">สรุปผล</button>
        </nav>
        
        <footer class="text-center text-white text-xs py-1 opacity-70 z-10 backdrop-blur-sm">
            พัฒนาโดย นายทศพร คงสุขนิรันดร์ ตำแหน่งแพทย์แผนไทย
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
